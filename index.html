<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D&D Combat Tracker</title>
    <!-- Gebruik betrouwbare CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #FDF6F4; 
            -webkit-tap-highlight-color: transparent;
        }
        .peach-bg { background-color: #F4BEAE; }
        .brown-text { color: #785A3C; }
        .peach-border { border-color: #F4BEAE; }
        
        /* Simpele animaties */
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.3s ease; }
        
        /* Hide scrollbars */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Robuuste Icon Component
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const DEFAULT_DATA = {
            character_identity: { name: "Finn", class: "Wizard", level: 3 },
            ability_scores: { str: 8, dex: 14, con: 12, int: 16, wis: 13, cha: 10 },
            combat_stats: {
                hp: { current: 14, max: 14, temp: 0 },
                armor_class: 12,
                initiative: 2,
                proficiency_bonus: 2,
                speed: "30 ft."
            },
            skills: { athletics: -1, acrobatics: 2, stealth: 2, arcana: 5, perception: 1, insight: 1 },
            spellcasting: {
                slots: { level_1: { max: 4, used: 0 }, level_2: { max: 2, used: 0 } },
                spells: {
                    actions: [
                        { name: "Fire Bolt", description: "Werp een vuurbal. 1d10 damage.", casting_time: "1 Action" },
                        { name: "Magic Missile", description: "Drie magische pijlen die altijd raken.", casting_time: "1 Action" }
                    ],
                    bonus: [
                        { name: "Misty Step", description: "Teleporteer 30ft naar een plek die je ziet.", casting_time: "1 Bonus Action" }
                    ],
                    reactions: [
                        { name: "Shield", description: "+5 AC tot je volgende beurt.", casting_time: "1 Reaction" }
                    ]
                }
            }
        };

        const App = () => {
            const [character, setCharacter] = useState(DEFAULT_DATA);
            const [mode, setMode] = useState('play');
            const [activeTab, setActiveTab] = useState('stats');
            const [combatSubTab, setCombatSubTab] = useState('actions');
            const [githubConfig, setGithubConfig] = useState({ 
                token: '', 
                repo: 'Mosa-1994/dnd-character-app', 
                path: 'characters/data.json' 
            });
            const [sessionNote, setSessionNote] = useState('');
            const [notification, setNotification] = useState(null);
            const [loading, setLoading] = useState(false);

            // Laden uit LocalStorage
            useEffect(() => {
                const saved = localStorage.getItem('dnd_combat_v1');
                if (saved) setCharacter(JSON.parse(saved));
                const conf = localStorage.getItem('dnd_config_v1');
                if (conf) setGithubConfig(JSON.parse(conf));
            }, []);

            // Opslaan in LocalStorage
            useEffect(() => {
                localStorage.setItem('dnd_combat_v1', JSON.stringify(character));
            }, [character]);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const updateHP = (val) => {
                setCharacter(prev => ({
                    ...prev,
                    combat_stats: {
                        ...prev.combat_stats,
                        hp: { 
                            ...prev.combat_stats.hp, 
                            current: Math.min(prev.combat_stats.hp.max, Math.max(0, prev.combat_stats.hp.current + val)) 
                        }
                    }
                }));
            };

            const syncToGithub = async (type = 'char') => {
                if (!githubConfig.token) return notify("Vul eerst je GitHub token in!", "error");
                setLoading(true);
                
                const path = type === 'char' ? githubConfig.path : `session-notes/${new Date().toISOString().split('T')[0]}.md`;
                const content = type === 'char' ? JSON.stringify(character, null, 2) : sessionNote;
                
                try {
                    // 1. Check of bestand bestaat (voor de SHA)
                    const getRes = await fetch(`https://api.github.com/repos/${githubConfig.repo}/contents/${path}`, {
                        headers: { 'Authorization': `token ${githubConfig.token}` }
                    });
                    const existingFile = getRes.ok ? await getRes.json() : null;

                    // 2. Schrijf bestand
                    const res = await fetch(`https://api.github.com/repos/${githubConfig.repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `token ${githubConfig.token}`,
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({
                            message: `Update via Tracker: ${type}`,
                            content: btoa(unescape(encodeURIComponent(content))),
                            sha: existingFile ? existingFile.sha : undefined
                        })
                    });

                    if (res.ok) {
                        notify(type === 'char' ? "Karakter gesynchroniseerd!" : "Notitie opgeslagen!");
                        if (type === 'note') setSessionNote('');
                    } else {
                        const err = await res.json();
                        notify(`Fout: ${err.message}`, "error");
                    }
                } catch (e) {
                    notify("Netwerkfout bij sync", "error");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="peach-bg p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
                        <div>
                            <h1 className="font-extrabold brown-text text-xl leading-none">{character.character_identity.name}</h1>
                            <p className="text-[10px] font-bold opacity-70 uppercase mt-1">Lvl {character.character_identity.level} {character.character_identity.class}</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setMode(mode === 'play' ? 'edit' : 'play')} className="p-2.5 bg-white/40 rounded-full active:scale-95 transition-transform">
                                <Icon name={mode === 'play' ? 'edit-3' : 'play'} size={20} />
                            </button>
                            <button onClick={() => syncToGithub('char')} className={`p-2.5 bg-white/40 rounded-full active:scale-95 transition-transform ${loading ? 'animate-spin' : ''}`}>
                                <Icon name="github" size={20} />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-4 max-w-lg mx-auto w-full space-y-4">
                        {mode === 'edit' ? (
                            <div className="space-y-4 fade-enter-active">
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-orange-100">
                                    <h2 className="font-bold mb-4 brown-text flex items-center gap-2"><Icon name="settings" size={18}/> Instellingen</h2>
                                    <div className="space-y-3">
                                        <label className="block">
                                            <span className="text-[10px] font-bold text-stone-400 uppercase ml-1">GitHub Token</span>
                                            <input type="password" placeholder="ghp_..." className="w-full mt-1 p-3 rounded-2xl bg-stone-50 border-none text-xs focus:ring-2 focus:ring-orange-200" 
                                                value={githubConfig.token} onChange={e => {
                                                    const c = {...githubConfig, token: e.target.value};
                                                    setGithubConfig(c);
                                                    localStorage.setItem('dnd_config_v1', JSON.stringify(c));
                                                }} />
                                        </label>
                                        <label className="block">
                                            <span className="text-[10px] font-bold text-stone-400 uppercase ml-1">Repo Pad</span>
                                            <input type="text" placeholder="User/Repo" className="w-full mt-1 p-3 rounded-2xl bg-stone-50 border-none text-xs" 
                                                value={githubConfig.repo} onChange={e => setGithubConfig({...githubConfig, repo: e.target.value})} />
                                        </label>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-orange-100">
                                    <h2 className="font-bold mb-2 brown-text text-sm">Raw JSON Data</h2>
                                    <textarea className="w-full h-80 p-4 text-[10px] font-mono bg-stone-50 rounded-2xl border-none focus:ring-0" 
                                        value={JSON.stringify(character, null, 2)} onChange={e => { try { setCharacter(JSON.parse(e.target.value)) } catch(e){} }} />
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4 fade-enter-active">
                                {/* HP & AC Widgets */}
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm text-center border border-orange-50 relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-1 bg-red-300"></div>
                                        <span className="text-[10px] font-black text-stone-300 uppercase tracking-widest">Hit Points</span>
                                        <div className="flex items-center justify-center gap-4 my-2">
                                            <button onClick={() => updateHP(-1)} className="w-10 h-10 rounded-full bg-stone-50 brown-text font-black text-xl active:bg-orange-100 transition-colors">-</button>
                                            <span className="text-4xl font-black text-stone-800">{character.combat_stats.hp.current}</span>
                                            <button onClick={() => updateHP(1)} className="w-10 h-10 rounded-full bg-stone-50 brown-text font-black text-xl active:bg-orange-100 transition-colors">+</button>
                                        </div>
                                        <span className="text-[10px] font-bold text-stone-400">MAX {character.combat_stats.hp.max}</span>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm text-center border border-orange-50 relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-1 bg-blue-300"></div>
                                        <span className="text-[10px] font-black text-stone-300 uppercase tracking-widest">Armor Class</span>
                                        <div className="text-5xl font-black text-stone-800 my-2">{character.combat_stats.armor_class}</div>
                                        <span className="text-[10px] font-bold text-stone-400 uppercase tracking-tighter">Initiative +{character.combat_stats.initiative}</span>
                                    </div>
                                </div>

                                {activeTab === 'stats' ? (
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-orange-50">
                                        <div className="flex items-center justify-between mb-6">
                                            <h3 className="font-bold brown-text flex items-center gap-2"><Icon name="user" size={18}/> Skills</h3>
                                            <div className="px-3 py-1 bg-orange-50 rounded-full text-[10px] font-bold brown-text">Prof: +{character.combat_stats.proficiency_bonus}</div>
                                        </div>
                                        <div className="grid grid-cols-1 gap-1">
                                            {Object.entries(character.skills).map(([s, v]) => (
                                                <div key={s} className="flex justify-between items-center py-3 border-b border-stone-50 last:border-0">
                                                    <span className="capitalize text-sm font-semibold text-stone-600">{s.replace('_', ' ')}</span>
                                                    <span className="font-black text-stone-800">{v >= 0 ? '+' : ''}{v}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {/* Obsidian Notes */}
                                        <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-orange-50 space-y-3">
                                            <div className="flex justify-between items-center">
                                                <span className="text-[10px] font-black text-stone-300 uppercase tracking-wider flex items-center gap-2"><Icon name="file-text" size={12}/> Sessie Notitie</span>
                                                <button onClick={() => syncToGithub('note')} className="p-2 bg-stone-50 rounded-xl active:bg-orange-100"><Icon name="save" size={16}/></button>
                                            </div>
                                            <textarea className="w-full h-24 text-sm p-3 bg-stone-50 rounded-2xl border-none focus:ring-0 placeholder-stone-300" 
                                                placeholder="Wat gebeurt er deze beurt?" value={sessionNote} onChange={e => setSessionNote(e.target.value)} />
                                        </div>

                                        {/* Action Economy Tabs */}
                                        <div className="flex bg-stone-200/40 p-1.5 rounded-2xl gap-1">
                                            {['actions', 'bonus', 'reactions'].map(t => (
                                                <button key={t} onClick={() => setCombatSubTab(t)} 
                                                    className={`flex-1 py-2.5 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all ${combatSubTab === t ? 'bg-white shadow-sm brown-text' : 'text-stone-400'}`}>
                                                    {t}
                                                </button>
                                            ))}
                                        </div>

                                        {/* Spells/Actions List */}
                                        <div className="space-y-2 pb-10">
                                            {character.spellcasting.spells[combatSubTab]?.map((s, i) => (
                                                <div key={i} className="bg-white p-5 rounded-3xl shadow-sm border border-stone-50 active:scale-[0.98] transition-transform">
                                                    <div className="flex justify-between items-start">
                                                        <span className="font-bold text-stone-800">{s.name}</span>
                                                        <span className="text-[9px] font-bold text-stone-400 uppercase tracking-widest">{s.casting_time}</span>
                                                    </div>
                                                    <p className="text-xs text-stone-500 mt-2 leading-relaxed">{s.description}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-stone-100 p-4 pb-10 flex justify-around items-center z-40">
                        <button onClick={() => setActiveTab('stats')} className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === 'stats' ? 'brown-text' : 'text-stone-300'}`}>
                            <div className={`p-3.5 rounded-2xl transition-all ${activeTab === 'stats' ? 'peach-bg shadow-lg scale-110' : ''}`}><Icon name="user" size={22} /></div>
                            <span className="text-[10px] font-black uppercase tracking-widest">Stats</span>
                        </button>
                        <button onClick={() => setActiveTab('combat')} className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === 'combat' ? 'brown-text' : 'text-stone-300'}`}>
                            <div className={`p-3.5 rounded-2xl transition-all ${activeTab === 'combat' ? 'peach-bg shadow-lg scale-110' : ''}`}><Icon name="sword" size={22} /></div>
                            <span className="text-[10px] font-black uppercase tracking-widest">Combat</span>
                        </button>
                    </nav>

                    {/* Toast Notification */}
                    {notification && (
                        <div className="fixed bottom-28 left-4 right-4 z-50 animate-fade">
                            <div className={`p-4 rounded-[1.5rem] shadow-2xl text-xs font-black text-center border-2 ${notification.type === 'error' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-green-50 text-green-700 border-green-100'}`}>
                                {notification.msg}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
