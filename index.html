<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Combat Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDF6F4; }
        .peach-bg { background-color: #F4BEAE; }
        .brown-text { color: #785A3C; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Icons setup
        const Icon = ({ name, size = 20, className = "" }) => {
            const LucideIcon = lucide[name.charAt(0).toUpperCase() + name.slice(1).replace(/-([a-z])/g, g => g[1].toUpperCase())];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        const DEFAULT_CHARACTER = {
            character_identity: { name: "Finn", class: "Wizard", level: 3 },
            ability_scores: { str: 8, dex: 14, con: 12, int: 16, wis: 13, cha: 10 },
            combat_stats: {
                hp: { current: 14, max: 14, temp: 0 },
                armor_class: 12,
                initiative: 2,
                proficiency_bonus: 2,
                speed: "30 ft."
            },
            skills: { athletics: -1, stealth: 2, arcana: 5, perception: 1 },
            spellcasting: {
                slots: { level_1: { max: 4, used: 0 }, level_2: { max: 2, used: 0 } },
                spells: {
                    actions: [{ name: "Fire Bolt", description: "Werp een vuurbal." }, { name: "Magic Missile", description: "Drie magische pijlen." }],
                    bonus: [{ name: "Misty Step", description: "Teleporteer 30ft." }],
                    reactions: [{ name: "Shield", description: "+5 AC tot einde beurt." }]
                }
            }
        };

        const App = () => {
            const [character, setCharacter] = useState(DEFAULT_CHARACTER);
            const [mode, setMode] = useState('play');
            const [activeTab, setActiveTab] = useState('stats');
            const [combatSubTab, setCombatSubTab] = useState('actions');
            const [githubConfig, setGithubConfig] = useState({ token: '', repo: 'Mosa-1994/dnd-character-app', path: 'characters/data.json' });
            const [sessionNote, setSessionNote] = useState('');
            const [notification, setNotification] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem('dnd_app_data');
                if (saved) setCharacter(JSON.parse(saved));
                const savedConf = localStorage.getItem('dnd_app_gh');
                if (savedConf) setGithubConfig(JSON.parse(savedConf));
            }, []);

            useEffect(() => {
                localStorage.setItem('dnd_app_data', JSON.stringify(character));
            }, [character]);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const updateHP = (val) => {
                setCharacter(prev => ({
                    ...prev,
                    combat_stats: {
                        ...prev.combat_stats,
                        hp: { ...prev.combat_stats.hp, current: Math.min(prev.combat_stats.hp.max, Math.max(0, prev.combat_stats.hp.current + val)) }
                    }
                }));
            };

            const syncToGithub = async (type = 'char') => {
                if (!githubConfig.token) return notify("Token vereist!", "error");
                
                const path = type === 'char' ? githubConfig.path : `session-notes/${new Date().toISOString().split('T')[0]}.md`;
                const content = type === 'char' ? JSON.stringify(character, null, 2) : sessionNote;
                
                try {
                    const getRes = await fetch(`https://api.github.com/repos/${githubConfig.repo}/contents/${path}`, {
                        headers: { Authorization: `token ${githubConfig.token}` }
                    });
                    const fileData = getRes.ok ? await getRes.json() : null;

                    const res = await fetch(`https://api.github.com/repos/${githubConfig.repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: { Authorization: `token ${githubConfig.token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: `Update via D&D Tracker: ${type}`,
                            content: btoa(unescape(encodeURIComponent(content))),
                            sha: fileData ? fileData.sha : undefined
                        })
                    });

                    if (res.ok) {
                        notify(`${type === 'char' ? 'Data' : 'Notitie'} opgeslagen!`);
                        if (type === 'note') setSessionNote('');
                    } else {
                        throw new Error();
                    }
                } catch (e) {
                    notify("Sync mislukt", "error");
                }
            };

            return (
                <div className="min-h-screen pb-24">
                    {/* Header */}
                    <header className="peach-bg p-4 sticky top-0 z-40 shadow-sm flex justify-between items-center">
                        <div>
                            <h1 className="font-extrabold brown-text text-lg">{character.character_identity.name}</h1>
                            <p className="text-[10px] uppercase font-bold opacity-60">Level {character.character_identity.level} {character.character_identity.class}</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setMode(mode === 'play' ? 'edit' : 'play')} className="p-2 bg-white/30 rounded-full">
                                <Icon name={mode === 'play' ? 'edit-2' : 'play'} size={18} />
                            </button>
                            <button onClick={() => syncToGithub('char')} className="p-2 bg-white/30 rounded-full">
                                <Icon name="upload" size={18} />
                            </button>
                        </div>
                    </header>

                    <main className="p-4 max-w-md mx-auto space-y-4">
                        {mode === 'edit' ? (
                            <div className="space-y-4 animate-fade">
                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-orange-100">
                                    <h2 className="font-bold mb-4 brown-text flex items-center gap-2"><Icon name="github" size={16}/> GitHub Sync</h2>
                                    <div className="space-y-3">
                                        <input type="password" placeholder="GitHub Token" className="w-full p-3 rounded-xl bg-stone-50 border border-stone-100 text-xs" 
                                            value={githubConfig.token} onChange={e => {
                                                const c = {...githubConfig, token: e.target.value};
                                                setGithubConfig(c);
                                                localStorage.setItem('dnd_app_gh', JSON.stringify(c));
                                            }} />
                                        <input type="text" placeholder="Repo (Mosa-1994/dnd-character-app)" className="w-full p-3 rounded-xl bg-stone-50 border border-stone-100 text-xs" 
                                            value={githubConfig.repo} onChange={e => setGithubConfig({...githubConfig, repo: e.target.value})} />
                                    </div>
                                </div>
                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-orange-100">
                                    <h2 className="font-bold mb-2 brown-text text-sm">JSON Data</h2>
                                    <textarea className="w-full h-64 p-3 text-[10px] font-mono bg-stone-50 rounded-xl border-none" 
                                        value={JSON.stringify(character, null, 2)} onChange={e => { try { setCharacter(JSON.parse(e.target.value)) } catch(e){} }} />
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-fade">
                                {/* HP & AC */}
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-5 rounded-[2rem] shadow-sm text-center border border-orange-50">
                                        <span className="text-[10px] font-black text-stone-300 uppercase">Hit Points</span>
                                        <div className="flex items-center justify-center gap-4 my-2">
                                            <button onClick={() => updateHP(-1)} className="w-8 h-8 rounded-full bg-stone-50 font-bold">-</button>
                                            <span className="text-3xl font-black">{character.combat_stats.hp.current}</span>
                                            <button onClick={() => updateHP(1)} className="w-8 h-8 rounded-full bg-stone-50 font-bold">+</button>
                                        </div>
                                        <span className="text-[10px] font-bold text-stone-400">MAX {character.combat_stats.hp.max}</span>
                                    </div>
                                    <div className="bg-white p-5 rounded-[2rem] shadow-sm text-center border border-orange-50">
                                        <span className="text-[10px] font-black text-stone-300 uppercase">Armor Class</span>
                                        <div className="text-4xl font-black my-2">{character.combat_stats.armor_class}</div>
                                        <span className="text-[10px] font-bold text-stone-400">SPEED {character.combat_stats.speed}</span>
                                    </div>
                                </div>

                                {activeTab === 'stats' ? (
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-orange-50">
                                        <h3 className="font-bold mb-4 brown-text flex items-center gap-2"><Icon name="shield" size={16}/> Skills</h3>
                                        <div className="space-y-3">
                                            {Object.entries(character.skills).map(([s, v]) => (
                                                <div key={s} className="flex justify-between items-center text-sm border-b border-stone-50 pb-2">
                                                    <span className="capitalize text-stone-600">{s}</span>
                                                    <span className="font-black">{v >= 0 ? '+' : ''}{v}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <div className="bg-white p-5 rounded-3xl shadow-sm border border-orange-50 space-y-3">
                                            <div className="flex justify-between items-center">
                                                <span className="text-[10px] font-black text-stone-300 uppercase">Sessie Notitie</span>
                                                <button onClick={() => syncToGithub('note')} className="p-1.5 bg-stone-50 rounded-lg"><Icon name="save" size={14}/></button>
                                            </div>
                                            <textarea className="w-full h-20 text-xs p-2 bg-stone-50 rounded-xl border-none focus:ring-0" 
                                                placeholder="Schrijf hier je Obsidian note..." value={sessionNote} onChange={e => setSessionNote(e.target.value)} />
                                        </div>
                                        <div className="flex bg-stone-200/50 p-1 rounded-2xl">
                                            {['actions', 'bonus', 'reactions'].map(t => (
                                                <button key={t} onClick={() => setCombatSubTab(t)} 
                                                    className={`flex-1 py-2 text-[10px] font-bold uppercase rounded-xl transition-all ${combatSubTab === t ? 'bg-white shadow-sm' : 'text-stone-400'}`}>
                                                    {t}
                                                </button>
                                            ))}
                                        </div>
                                        <div className="space-y-2">
                                            {character.spellcasting.spells[combatSubTab]?.map((s, i) => (
                                                <div key={i} className="bg-white p-4 rounded-2xl shadow-sm border border-stone-50">
                                                    <div className="font-bold text-sm">{s.name}</div>
                                                    <div className="text-[11px] text-stone-400 mt-1">{s.description}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-stone-100 p-3 pb-8 flex justify-around items-center">
                        <button onClick={() => setActiveTab('stats')} className={`flex flex-col items-center gap-1 ${activeTab === 'stats' ? 'brown-text' : 'text-stone-300'}`}>
                            <div className={`p-3 rounded-2xl ${activeTab === 'stats' ? 'peach-bg shadow-md' : ''}`}><Icon name="heart" /></div>
                            <span className="text-[9px] font-black uppercase tracking-widest">Stats</span>
                        </button>
                        <button onClick={() => setActiveTab('combat')} className={`flex flex-col items-center gap-1 ${activeTab === 'combat' ? 'brown-text' : 'text-stone-300'}`}>
                            <div className={`p-3 rounded-2xl ${activeTab === 'combat' ? 'peach-bg shadow-md' : ''}`}><Icon name="sword" /></div>
                            <span className="text-[9px] font-black uppercase tracking-widest">Combat</span>
                        </button>
                    </nav>

                    {/* Notif */}
                    {notification && (
                        <div className="fixed bottom-24 left-4 right-4 z-50 animate-fade">
                            <div className={`p-4 rounded-2xl shadow-xl text-xs font-bold text-center border ${notification.type === 'error' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-green-50 text-green-700 border-green-100'}`}>
                                {notification.msg}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // Initialize lucide icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
